<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>SOAR: Mystik Skies</title>
    <link rel="icon" type="image/png" href="assets/sprites/player_green.png">
    <link rel="stylesheet" href="style.css?v=9">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>

        <div id="ui-layer">
            <div id="top-bar">
                <div id="tribe-strip" aria-label="Tribal standings">
                    <div class="tribe-pip" data-team="green" id="pip-green">
                        <div class="pip-flag"></div>
                        <div class="pip-stats">
                            <div class="pip-name">GREEN</div>
                            <div class="pip-numbers">
                                <span class="pip-pop">0</span>
                                <span class="pip-sep">·</span>
                                <span class="pip-tents">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="tribe-pip" data-team="blue" id="pip-blue">
                        <div class="pip-flag"></div>
                        <div class="pip-stats">
                            <div class="pip-name">BLUE</div>
                            <div class="pip-numbers">
                                <span class="pip-pop">0</span>
                                <span class="pip-sep">·</span>
                                <span class="pip-tents">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="tribe-pip" data-team="yellow" id="pip-yellow">
                        <div class="pip-flag"></div>
                        <div class="pip-stats">
                            <div class="pip-name">YELLOW</div>
                            <div class="pip-numbers">
                                <span class="pip-pop">0</span>
                                <span class="pip-sep">·</span>
                                <span class="pip-tents">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="tribe-pip" data-team="red" id="pip-red">
                        <div class="pip-flag"></div>
                        <div class="pip-stats">
                            <div class="pip-name">RED</div>
                            <div class="pip-numbers">
                                <span class="pip-pop">0</span>
                                <span class="pip-sep">·</span>
                                <span class="pip-tents">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="player-hp">
                    <div id="player-hp-fill"></div>
                </div>
            </div>

            <div id="bottom-bar">
                <div id="spells-container">
                    <div class="spell-slot" id="spell-0">
                        <div class="key">1</div>
                        <div class="spell-icon fire-icon"></div>
                        <div class="name">FIREBALL</div>
                    </div>
                    <div class="spell-slot" id="spell-1">
                        <div class="key">2</div>
                        <div class="spell-icon air-icon"></div>
                        <div class="name">AERO</div>
                    </div>
                    <div class="spell-slot" id="spell-2">
                        <div class="key">3</div>
                        <div class="spell-icon earth-icon"></div>
                        <div class="name">QUAKE</div>
                    </div>
                    <div class="spell-slot" id="spell-3">
                        <div class="key">4</div>
                        <div class="spell-icon life-icon"></div>
                        <div class="name">LIFE</div>
                    </div>
                </div>
            </div>

            <div id="message-area"></div>
            <div id="controls-hint">WASD: Fly · L-Click: Shoot · R-Click: Spell · Scroll: Switch</div>
        </div>

        <div id="loading-text">Loading...</div>
    </div>

    <script type="module" src="js/main.js?v=9"></script>
</body>

</html>
